<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#082f3e">
  <meta name="description" content="Bosqichli arab tili fonetikasi — interaktiv kirish darsi">
  <title>Arab yozuvi sirlariga kirish</title>
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="stage2.css">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <main id="app" class="app-shell" aria-live="polite">
    <header class="topbar">
      <button id="homeButton" class="icon-button hidden" type="button" aria-label="Bosh sahifa">
        <span aria-hidden="true">⌂</span>
      </button>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">ض</span>
        <div>
          <strong>Bosqichli arab tili</strong>
          <small>Fonetika · 1-bosqich</small>
        </div>
      </div>
      <button id="effectButton" class="icon-button" type="button" aria-label="Sound effectlarni boshqarish">
        <span aria-hidden="true">♫</span>
      </button>
    </header>

    <section id="progressWrap" class="progress-wrap hidden" aria-label="Bosqich jarayoni">
      <div class="progress-meta">
        <span id="progressLabel">1 / 8</span>
        <span id="scoreLabel">0 XP</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section id="screen" class="screen"></section>
  </main>

  <div id="toast" class="toast" role="status"></div>

  <script src="app.js"></script>
</body>
</html>
